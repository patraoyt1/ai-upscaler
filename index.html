<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESRGAN Local</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js"></script>

<style>
body{
    background:#111827;
    color:white;
    font-family:Arial;
    text-align:center;
    padding:20px;
}

button{
    padding:10px 20px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

img{
    max-width:400px;
    margin-top:15px;
    border-radius:8px;
}
</style>
</head>

<body>

<h1 id="status">Carregando IA...</h1>

<input type="file" id="upload" accept="image/*">

<br><br>

<button id="processar" disabled>
Fazer Upscale
</button>

<br>

<h3>Original</h3>
<img id="original">

<h3>Resultado</h3>
<canvas id="resultado"></canvas>

<script>

let model = null;
let imageElement = null;

async function carregarModelo() {

    try {

        document.getElementById("status").innerText =
        "Carregando modelo ESRGAN...";

        model = await tf.loadGraphModel(
            "./models/esrgan/model.json"
        );

        document.getElementById("status").innerText =
        "Modelo carregado.";

        document.getElementById("processar").disabled = false;

    }
    catch(err){

        console.error(err);

        document.getElementById("status").innerText =
        "Erro ao carregar modelo.";
    }
}

carregarModelo();

document.getElementById("upload")
.addEventListener("change",(e)=>{

    const file = e.target.files[0];

    if(!file) return;

    imageElement = document.getElementById("original");

    imageElement.src = URL.createObjectURL(file);

});

document.getElementById("processar")
.addEventListener("click", async ()=>{

    if(!imageElement || !model) return;

    document.getElementById("status").innerText =
    "Processando...";

    await tf.nextFrame();

    const tensor = tf.tidy(()=>{

        return tf.browser
        .fromPixels(imageElement)
        .toFloat()
        .div(255)
        .expandDims(0);

    });

    const output = await model.executeAsync(tensor);

    const resultTensor =
    Array.isArray(output)
        ? output[0]
        : output;

    const squeezed = resultTensor.squeeze();

    const canvas =
    document.getElementById("resultado");

    await tf.browser.toPixels(
        squeezed.clipByValue(0,1),
        canvas
    );

    tensor.dispose();
    resultTensor.dispose();

    document.getElementById("status").innerText =
    "Concluído.";

});

</script>

</body>
</html>
