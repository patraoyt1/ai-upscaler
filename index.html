<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AI Local Upscaler - Versão de Diagnóstico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upscaler@0.14.1/dist/browser/umd/upscaler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@upscalerjs/esrgan-slim@0.3.1/dist/browser/umd/index.min.js"></script>
</head>
<body class="bg-slate-900 text-white p-6">
    <div x-data="upscalerApp()" x-init="tentarInicializar()" class="max-w-2xl mx-auto text-center">
        <h1 class="text-xl font-bold mb-4" x-text="status"></h1>
        <p class="text-xs text-gray-400" x-text="debugInfo"></p>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        function upscalerApp() {
            return {
                status: 'Buscando biblioteca...',
                debugInfo: '',

                async tentarInicializar() {
                    // Espera 1s para garantir o carregamento
                    setTimeout(() => {
                        // Varredura para encontrar a classe Upscaler
                        const nomesPossiveis = ['Upscaler', 'UpscalerJS', 'Upscalerjs', 'upscaler'];
                        let UpscalerLib = null;

                        for (let nome of nomesPossiveis) {
                            if (window[nome]) {
                                UpscalerLib = window[nome];
                                this.debugInfo = `Encontrado: ${nome}`;
                                break;
                            }
                        }

                        if (!UpscalerLib) {
                            // DEBUG FINAL: Listar tudo que parece com upscaler
                            const matches = Object.keys(window).filter(k => k.toLowerCase().includes('upscaler'));
                            this.status = 'Falha: Biblioteca não encontrada.';
                            this.debugInfo = 'Variáveis encontradas: ' + JSON.stringify(matches);
                            console.error("Nenhuma variável 'Upscaler' encontrada no window.");
                            return;
                        }

                        this.status = 'Biblioteca encontrada! Inicializando...';
                        try {
                            // Tenta carregar o modelo ESRGAN
                            const model = window['esrgan-slim'] || window.esrganSlim || {};
                            this.upscaler = new UpscalerLib({ model: model.x2 });
                            await this.upscaler.getModel();
                            this.status = 'IA PRONTA!';
                        } catch (e) {
                            this.status = 'Erro ao carregar modelo.';
                            this.debugInfo = e.message;
                        }
                    }, 1000);
                }
            }
        }
    </script>
</body>
</html>
