<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>AI Local Upscaler</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/upscaler@0.14.1/dist/browser/umd/upscaler.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@upscalerjs/esrgan-slim@0.3.1/dist/browser/umd/index.min.js"></script>
</head>
<body class="bg-slate-900 text-white p-6">
    <div x-data="upscalerApp()" x-init="inicializar()" class="max-w-2xl mx-auto text-center">
        <h1 class="text-2xl font-bold mb-4" x-text="statusTexto"></h1>
        <input type="file" @change="carregarImagem($event)" accept="image/*" class="mb-4">
        <div x-show="imgOriginalSrc">
            <img :src="imgOriginalSrc" class="max-w-xs mx-auto mb-4 border border-blue-500">
            <button @click="processar()" class="bg-blue-600 px-6 py-2 rounded">Processar Imagem</button>
        </div>
        <img :src="imgResultadoSrc" class="max-w-xs mx-auto mt-4 border border-green-500">
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        function upscalerApp() {
            return {
                upscaler: null,
                statusTexto: 'Carregando IA... aguarde...',
                imgOriginalSrc: '',
                imgResultadoSrc: '',

                async inicializar() {
                    try {
                        this.upscaler = new Upscaler({ model: window['esrgan-slim'].x2 });
                        await this.upscaler.getModel();
                        this.statusTexto = 'IA Pronta! Selecione uma imagem.';
                    } catch (e) {
                        this.statusTexto = 'Erro ao carregar IA. Verifique o console (F12).';
                        console.error(e);
                    }
                },
                carregarImagem(e) {
                    const reader = new FileReader();
                    reader.onload = (event) => { this.imgOriginalSrc = event.target.result; };
                    reader.readAsDataURL(e.target.files[0]);
                },
                async processar() {
                    this.statusTexto = 'Processando...';
                    const img = new Image();
                    img.src = this.imgOriginalSrc;
                    img.onload = async () => {
                        this.imgResultadoSrc = await this.upscaler.upscale(img);
                        this.statusTexto = 'Concluído!';
                    };
                }
            }
        }
    </script>
</body>
</html>
